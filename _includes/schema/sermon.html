<!-- Sermon JSON-LD @graph: Article (with Person author) + BreadcrumbList + WebPage -->
{% assign sermon_webpage_id = page.url | absolute_url | append: '#webpage' %}
{% assign sermon_article_id = page.url | absolute_url | append: '#article' %}
{% assign sermon_breadcrumb_id = page.url | absolute_url | append: '#breadcrumb' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebPage",
      "@id": {{ sermon_webpage_id | jsonify }},
      "url": {{ page.url | absolute_url | jsonify }},
      "name": {{ page.title | jsonify }},
      "description": {{ page.description | default: page.title | strip_html | truncate: 200 | jsonify }},
      "isPartOf": { "@id": "{{ site.url }}/#website" },
      "about": { "@id": "{{ site.url }}/#org" },
      "inLanguage": "en-US"
    },
    {
      "@type": "Article",
      "@id": {{ sermon_article_id | jsonify }},
      "headline": {{ page.title | jsonify }},
      "description": {{ page.description | default: page.title | strip_html | truncate: 200 | jsonify }},
      "datePublished": {{ page.date | date_to_xmlschema | jsonify }},
      "dateModified": {{ page.date | date_to_xmlschema | jsonify }},
      "author": {
        "@type": "Person",
        "@id": "{{ site.url }}/#author-nate-ellis",
        "name": {{ page.pastor | default: 'Pastor Nate Ellis' | jsonify }},
        "jobTitle": "Pastor",
        "worksFor": { "@id": "{{ site.url }}/#org" }
      },
      "publisher": { "@id": "{{ site.url }}/#org" },
      "mainEntityOfPage": { "@id": {{ sermon_webpage_id | jsonify }} },
      "image": {{ site.data.content.seo.meta.social_image | absolute_url | jsonify }},
      {% if page.audio_url %}"associatedMedia": {
        "@type": "AudioObject",
        "contentUrl": {{ page.audio_url | jsonify }},
        "encodingFormat": "audio/mpeg",
        "name": {{ page.title | append: ' - Audio' | jsonify }},
        {% if page.duration %}"duration": {{ page.duration | prepend: 'PT' | replace: ':', 'M' | append: 'S' | jsonify }},
        {% endif %}"creator": { "@id": "{{ site.url }}/#author-nate-ellis" }
      },
      {% endif %}"about": [
        { "@type": "Thing", "name": "Reformed Baptist Theology" },
        { "@type": "Thing", "name": "Expository Preaching" }
        {%- if page.scripture -%},
        { "@type": "Thing", "name": {{ page.scripture | jsonify }} }
        {%- endif -%}
        {%- if page.series -%},
        { "@type": "CreativeWorkSeries", "name": {{ page.series | jsonify }} }
        {%- endif %}
      ],
      "isPartOf": {
        "@type": "PodcastSeries",
        "name": {{ site.podcast.title | jsonify }},
        "url": {{ site.podcast.rss_url | jsonify }},
        "description": {{ site.podcast.description | jsonify }}
      },
      "genre": "Religious",
      "inLanguage": "en-US"
    },
    {
      "@type": "BreadcrumbList",
      "@id": {{ sermon_breadcrumb_id | jsonify }},
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "{{ site.url }}"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Sermons",
          "item": "{{ site.url }}/sermons/"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": {{ page.title | jsonify }},
          "item": {{ page.url | absolute_url | jsonify }}
        }
      ]
    }
  ]
}
</script>
